<div @fadeInOut
  (click)="addToCart(item)"
  role="button"
  tabindex="0"
  (keydown.enter)="addToCart(item)"
  class="group relative flex cursor-pointer flex-col overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-sm transition-all duration-300 hover:-translate-y-1 hover:border-rose-300 hover:shadow-xl dark:border-gray-700 dark:bg-gray-800">

  <!-- Promo badge -->
  <div *ngIf="hasPromo" class="absolute top-2 left-2 z-10 rounded-full bg-rose-500 px-2.5 py-1 text-xs font-bold text-white shadow-md">
    {{ promoLabel }}
  </div>

  <!-- Image / Placeholder -->
  <div class="relative aspect-square overflow-hidden bg-gradient-to-br from-gray-100 to-gray-200 dark:from-gray-700 dark:to-gray-800">
    <ng-container *ngIf="item.medias && item.medias.length > 0; else noImage">
      <img
        [src]="getMenuItemImage()"
        [alt]="item.title"
        class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110"
        loading="lazy" />
    </ng-container>
    <ng-template #noImage>
      <div class="flex h-full w-full items-center justify-center text-gray-300 dark:text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-12 w-12">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
      </div>
    </ng-template>

    <!-- Hover overlay with + icon -->
    <div class="pointer-events-none absolute inset-0 flex items-center justify-center bg-black/30 opacity-0 transition-opacity duration-300 group-hover:opacity-100">
      <div class="flex h-14 w-14 items-center justify-center rounded-full bg-primary text-white shadow-lg ring-4 ring-white/30">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="h-7 w-7">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="flex flex-1 flex-col p-3">
    <h3 class="truncate text-sm font-bold text-gray-900 dark:text-white" [title]="item.title">
      {{ item.title }}
    </h3>

    <div class="mt-1.5 flex items-baseline gap-1.5">
      <ng-container *ngIf="hasPromo; else regularPrice">
        <span class="text-xl font-extrabold text-rose-600">
          {{ appliedPrice | number: '1.2-2' }}
        </span>
        <span class="text-xs font-medium text-gray-500 dark:text-gray-400">
          {{ item.currency.symbol }}
        </span>
        <span class="text-xs text-gray-400 line-through">
          {{ item.price | number: '1.2-2' }}
        </span>
      </ng-container>
      <ng-template #regularPrice>
        <span class="text-xl font-extrabold text-primary">
          {{ item.price | number: '1.2-2' }}
        </span>
        <span class="text-xs font-medium text-gray-500 dark:text-gray-400">
          {{ item.currency.symbol }}
        </span>
      </ng-template>
    </div>
  </div>
</div>
