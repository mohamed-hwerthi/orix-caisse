<section class="body-font relative overflow-hidden">
  <div class="container relative z-10 mx-auto px-5 pt-10 pb-4">
    <!-- Categories Grid -->
    <div class="flex flex-wrap items-start justify-center gap-4 md:gap-6">
      <div *ngFor="let category of allCategories; let i = index" class="text-center">
        <!-- Category Card -->
        <button
          (click)="selectCategory(category)"
          [@slideIn]="determineAnimation(i)"
          [ngClass]="
            selectedCategory === category.id
              ? 'border-primary bg-rose-50 shadow-md ring-2 ring-rose-200'
              : 'border-gray-200 bg-white hover:border-rose-300 hover:shadow-md dark:border-gray-700 dark:bg-gray-800'
          "
          class="flex h-24 w-24 items-center justify-center overflow-hidden rounded-2xl border transition-all duration-300 hover:-translate-y-1">
          <img *ngIf="category.medias && category.medias.length > 0; else categoryFallback"
            [src]="getCategoryImage(category)" [alt]="category.name" class="h-full w-full object-cover" />
          <ng-template #categoryFallback>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              class="h-10 w-10"
              [ngClass]="selectedCategory === category.id ? 'text-primary' : 'text-gray-400 dark:text-gray-500'">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 8.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
            </svg>
          </ng-template>
        </button>

        <!-- Category Name -->
        <span class="mt-2 block max-w-[6rem] truncate text-sm font-medium"
          [ngClass]="selectedCategory === category.id ? 'text-primary' : 'text-gray-700 dark:text-gray-300'">
          {{ category.name }}
        </span>
      </div>
    </div>
  </div>
</section>

<!-- Separator Line with Icon -->

  <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
