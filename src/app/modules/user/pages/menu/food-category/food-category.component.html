<!-- Vertical category list (used inside the filter drawer) -->
<div class="flex flex-col gap-1.5">
  <!-- "Tous" — réinitialiser le filtre -->
  <button
    type="button"
    (click)="clearCategory()"
    [ngClass]="
      !selectedCategory
        ? 'bg-primary text-white border-primary shadow-sm'
        : 'bg-white text-gray-700 border-gray-200 hover:border-rose-300 hover:bg-rose-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700'
    "
    class="flex items-center gap-2 rounded-lg border px-3 py-2 text-sm font-semibold transition w-full text-left">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4 shrink-0">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5" />
    </svg>
    <span class="flex-1">Tous les articles</span>
    <span *ngIf="!selectedCategory" class="text-xs opacity-80">✓</span>
  </button>

  <button
    type="button"
    *ngFor="let category of allCategories"
    (click)="selectCategory(category)"
    [ngClass]="
      selectedCategory === category.id
        ? 'bg-primary text-white border-primary shadow-sm'
        : 'bg-white text-gray-700 border-gray-200 hover:border-rose-300 hover:bg-rose-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700'
    "
    class="flex items-center gap-2 rounded-lg border px-3 py-2 text-sm font-semibold transition w-full text-left">
    <span class="flex h-7 w-7 shrink-0 items-center justify-center rounded-md overflow-hidden"
      [ngClass]="selectedCategory === category.id ? 'bg-white/20' : 'bg-gray-100 dark:bg-gray-700'">
      <img *ngIf="category.medias && category.medias.length > 0; else fallback"
        [src]="getCategoryImage(category)" [alt]="category.name" class="h-full w-full object-cover" />
      <ng-template #fallback>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4 opacity-60">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 8.25V6z" />
        </svg>
      </ng-template>
    </span>
    <span class="flex-1 truncate">{{ category.name }}</span>
    <span *ngIf="selectedCategory === category.id" class="text-xs opacity-80">✓</span>
  </button>

  <p *ngIf="allCategories.length === 0" class="text-xs text-gray-400 text-center py-4">
    Aucune catégorie
  </p>
</div>
