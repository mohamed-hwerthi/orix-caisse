<div
  class="mt-24 flex-col rounded-lg border-2 border-white/50 bg-white/80 px-8 py-4 shadow-lg shadow-white/50 dark:bg-background/70 sm:flex-row">
  <div class="mb-4 flex items-center justify-between">
    <div class="flex-col items-center">
      <h3 class="text-md font-bold text-foreground">Last 10 Reviews Live Data</h3>
      <span class="text-xs text-muted-foreground">Updated {{ timeSinceLastUpdate$ | async }} minutes ago</span>
    </div>
  </div>

  <div class="relative overflow-x-auto">
    <table *ngIf="isLoading" class="w-full table-auto">
      <thead class="border-b-2 text-xs uppercase text-muted-foreground">
        <tr>
          <th class="py-3 text-left">Review ID</th>
          <th class="py-3">Comment</th>
          <th class="py-3">Date</th>
          <th class="py-3">Rate</th>
          <th class="py-3">Publisher</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of [1,2,3,4,5,6,7,8]" class="border-b border-gray-100 dark:border-gray-800">
          <td class="py-3"><div class="h-4 w-20 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div></td>
          <td class="py-3"><div class="mx-auto h-4 w-40 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div></td>
          <td class="py-3"><div class="mx-auto h-4 w-20 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div></td>
          <td class="py-3"><div class="mx-auto h-4 w-12 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div></td>
          <td class="py-3"><div class="mx-auto h-4 w-24 animate-pulse rounded bg-gray-200 dark:bg-gray-700"></div></td>
        </tr>
      </tbody>
    </table>
    <table *ngIf="!isLoading" class="w-full table-auto">
      <!--Table head-->
      <thead class="border-b-2 text-xs uppercase text-muted-foreground">
        <tr>
          <th class="py-3 text-left">Review ID</th>
          <th class="py-3">Comment</th>
          <th class="py-3">Date</th>
          <th class="py-3">Rate</th>
          <th class="py-3">Publisher</th>
        </tr>
      </thead>
      <!--end Table head-->
      <!--Table body-->
      <tbody>
        <tr
          *ngFor="let review of reviews"
          reviews-table-item
          [review]="review"
          class="border-b border-dashed border-border hover:bg-card"></tr>
      </tbody>
      <!--end::Table body-->
    </table>
    <p *ngIf="!isLoading && reviews.length === 0" class="mx-auto p-12 text-center text-foreground">No items available</p>
  </div>
</div>
