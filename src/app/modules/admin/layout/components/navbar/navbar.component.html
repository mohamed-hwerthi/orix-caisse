<div class="relative bg-background">
  <div class="mx-auto px-5">
    <div class="flex items-center justify-between py-3.5 md:justify-start">
      <!-- Mobile Navigation Menu Button-->
      <div class="sm:order-1 md:hidden">
        <button
          (click)="toggleMobileMenu()"
          type="button"
          class="inline-flex items-center justify-center rounded-md bg-muted p-2 text-muted-foreground focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary hover:bg-muted-foreground hover:text-muted"
          aria-expanded="false">
          <span class="sr-only">Open menu</span>
          <!-- Heroicon name: outline/menu -->
          <svg-icon src="assets/icons/heroicons/outline/menu.svg" [svgClass]="'h-6 w-6'"> </svg-icon>
        </button>
      </div>

      <!-- Logo -->
      <div class="flex items-center justify-start sm:order-2 md:mr-10 lg:hidden">
        <a class="flex items-center justify-center rounded bg-primary p-2 focus:outline-none focus:ring-1">
          <svg-icon src="assets/icons/logo.svg"></svg-icon>
        </a>
        <b class="hidden pl-3 text-sm font-bold text-foreground sm:block"> Orix Bio </b>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden space-x-10 sm:order-3 md:flex">
        <app-navbar-menu></app-navbar-menu>
      </div>

      <!-- Search + Notifications + Profile -->
      <div class="items-center justify-end gap-3 sm:order-4 md:flex md:flex-1 lg:w-0">
        <!-- Search -->
        <div class="relative hidden lg:block">
          <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-muted-foreground/60">
            <svg-icon src="assets/icons/heroicons/outline/search.svg" [svgClass]="'h-4 w-4'"></svg-icon>
          </span>
          <input
            type="text"
            placeholder="Search…"
            class="w-56 rounded-md border border-border bg-card pl-8 pr-3 py-2 text-sm text-foreground placeholder:text-muted-foreground/60 focus:outline-none focus:ring-1 focus:ring-primary border-gray-200 dark:border-gray-700 dark:bg-gray-900 text-gray-900 dark:text-white" />
        </div>

        <!-- Notifications -->
        <button
          type="button"
          class="relative rounded-md p-2 text-muted-foreground hover:bg-card hover:text-foreground"
          aria-label="Notifications">
          <svg-icon src="assets/icons/heroicons/outline/bell.svg" [svgClass]="'h-5 w-5'"></svg-icon>
          <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-primary"></span>
        </button>

        <!-- Profile -->
        <app-profile-menu></app-profile-menu>
      </div>
    </div>
  </div>
  <!-- Mobile menu -->
  <app-navbar-mobile></app-navbar-mobile>
</div>
