<!-- Card -->
<div class="flex h-[420px] flex-col rounded-lg bg-background p-8">
  <!-- Image -->
  <div
    [ngStyle]="{ 'background-image': 'url(' + (menuItem.imageUrl || 'assets/images/no-image.svg') + ')' }"
    class="h-[240px] cursor-pointer rounded-md bg-cover bg-center bg-card transition duration-150 ease-in-out hover:opacity-75"></div>
  <!-- Description  -->
  <h2 class="text-md mt-6 font-semibold text-foreground">{{ menuItem.title }}</h2>
  <div class="flex items-end justify-between text-sm font-semibold text-muted-foreground">
    <div> Price: {{ menuItem.price | currency }}</div>

    <div>Sales Count: {{menuItem.salesCount}}</div>
  </div>
  <!-- Buttons -->
  <div class="mt-6 flex items-center justify-between">
    <button
      routerLink="/admin/orders"
      class="hover:bg-primary-600 flex-none rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground">
      Place an order
    </button>
    <button
    routerLink="/admin/items"
      class="lex-none rounded-md bg-card px-4 py-2.5 text-xs font-semibold text-muted-foreground hover:bg-muted hover:text-foreground">
      View Item
    </button>
  </div>
</div>
<!-- end Card -->
