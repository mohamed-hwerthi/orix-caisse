<td class="py-3">
  <div class="flex items-center gap-3">
    <img
      [src]="menuItem.imageUrl || 'assets/images/no-image.svg'"
      (error)="onImageError($event)"
      alt=""
      class="h-10 w-10 flex-none rounded-md object-cover bg-card" />
    <div class="flex flex-col">
      <span class="text-sm font-semibold text-foreground">{{ menuItem.title }}</span>
      <span class="text-xs text-muted-foreground">{{ truncateDescription(menuItem.description || '') }}</span>
    </div>
  </div>
</td>
<td class="py-3 text-center text-sm font-semibold text-foreground">
  {{ menuItem.price | currency }}
</td>
<td class="py-3 text-center text-sm font-semibold text-foreground">
  {{ menuItem.salesCount || 0 }}
</td>
<td class="py-3 text-center text-sm font-semibold text-green-500">
  {{ (menuItem.price * (menuItem.salesCount || 0)) | currency }}
</td>
<td class="py-3 text-center text-xs text-muted-foreground">
  {{ menuItem.categories[0]?.name || '—' }}
</td>
<td class="py-3 text-center">
  <div class="flex items-center justify-center gap-2">
    <button
      (click)="openUpdateModal()"
      class="rounded-md bg-card p-1.5 text-muted-foreground hover:bg-muted hover:text-foreground"
      title="Edit">
      <svg-icon src="assets/icons/heroicons/outline/edit.svg" [svgClass]="'h-4 w-4'"></svg-icon>
    </button>
    <button
      (click)="openDeleteModal()"
      class="rounded-md bg-card p-1.5 text-muted-foreground hover:bg-destructive hover:text-destructive-foreground"
      title="Delete">
      <svg-icon src="assets/icons/heroicons/outline/delete.svg" [svgClass]="'h-4 w-4'"></svg-icon>
    </button>
  </div>
</td>
